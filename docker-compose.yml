version: '3.8'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: learnhub-sqlserver
    environment:
      SA_PASSWORD: "LearnHub@Strong123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - learnhub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD","/opt/mssql-tools18/bin/sqlcmd","-S","localhost","-U","sa","-P","LearnHub@Strong123","-Q","SELECT 1","-No"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: learnhub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: learnhub
      RABBITMQ_DEFAULT_PASS: learnhub123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - learnhub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: learnhub-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    networks:
      - learnhub-network
    restart: unless-stopped

volumes:
  sqlserver_data:
  rabbitmq_data:
  azurite_data:

networks:
  learnhub-network:
    driver: bridge